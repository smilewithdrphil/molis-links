<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="64" fill="#000"/>
  <g transform="translate(256,256) scale(21.3)">
    <!-- Outer rim -->
    <circle cx="0" cy="0" r="9" fill="none" stroke="#fff" stroke-width="1.4"/>
    <!-- Inner hub -->
    <circle cx="0" cy="0" r="2.2" fill="#fff"/>
    <!-- 8 spokes -->
    <line x1="0" y1="-9" x2="0" y2="-2.2" stroke="#fff" stroke-width="1.3"/>
    <line x1="0" y1="2.2" x2="0" y2="9" stroke="#fff" stroke-width="1.3"/>
    <line x1="-9" y1="0" x2="-2.2" y2="0" stroke="#fff" stroke-width="1.3"/>
    <line x1="2.2" y1="0" x2="9" y2="0" stroke="#fff" stroke-width="1.3"/>
    <line x1="-6.36" y1="-6.36" x2="-1.76" y2="-1.76" stroke="#fff" stroke-width="1.1"/>
    <line x1="1.76" y1="1.76" x2="6.36" y2="6.36" stroke="#fff" stroke-width="1.1"/>
    <line x1="6.36" y1="-6.36" x2="1.76" y2="-1.76" stroke="#fff" stroke-width="1.1"/>
    <line x1="-1.76" y1="1.76" x2="-6.36" y2="6.36" stroke="#fff" stroke-width="1.1"/>
    <!-- Cardinal point diamond tips -->
    <polygon points="0,-11.5 1,-9.2 0,-8.2 -1,-9.2" fill="#fff"/>
    <polygon points="0,11.5 -1,9.2 0,8.2 1,9.2" fill="#fff"/>
    <polygon points="-11.5,0 -9.2,-1 -8.2,0 -9.2,1" fill="#fff"/>
    <polygon points="11.5,0 9.2,1 8.2,0 9.2,-1" fill="#fff"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="24" fill="#000"/>
  <g transform="translate(96,96)" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round">
    <!-- outer ring -->
    <circle r="68" stroke-width="6"/>
    <!-- inner ring -->
    <circle r="20" stroke-width="4"/>
    <!-- 8 spokes -->
    <line x1="0" y1="-20" x2="0" y2="-68"/>
    <line x1="14.14" y1="-14.14" x2="48.08" y2="-48.08"/>
    <line x1="20" y1="0" x2="68" y2="0"/>
    <line x1="14.14" y1="14.14" x2="48.08" y2="48.08"/>
    <line x1="0" y1="20" x2="0" y2="68"/>
    <line x1="-14.14" y1="14.14" x2="-48.08" y2="48.08"/>
    <line x1="-20" y1="0" x2="-68" y2="0"/>
    <line x1="-14.14" y1="-14.14" x2="-48.08" y2="-48.08"/>
    <!-- 8 handle pegs on outer ring -->
    <circle cx="0" cy="-68" r="8" fill="#fff" stroke="none"/>
    <circle cx="48.08" cy="-48.08" r="8" fill="#fff" stroke="none"/>
    <circle cx="68" cy="0" r="8" fill="#fff" stroke="none"/>
    <circle cx="48.08" cy="48.08" r="8" fill="#fff" stroke="none"/>
    <circle cx="0" cy="68" r="8" fill="#fff" stroke="none"/>
    <circle cx="-48.08" cy="48.08" r="8" fill="#fff" stroke="none"/>
    <circle cx="-68" cy="0" r="8" fill="#fff" stroke="none"/>
    <circle cx="-48.08" cy="-48.08" r="8" fill="#fff" stroke="none"/>
  </g>
</svg>

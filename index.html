<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Molis Links">
  <link rel="apple-touch-icon" href="./icons/icon-192.svg">
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <title>Molis Links</title>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <svg class="header-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="9" fill="none" stroke="#fff" stroke-width="1.4"/>
      <circle cx="12" cy="12" r="2.2" fill="#fff"/>
      <line x1="12" y1="3" x2="12" y2="9.8" stroke="#fff" stroke-width="1.3"/>
      <line x1="12" y1="14.2" x2="12" y2="21" stroke="#fff" stroke-width="1.3"/>
      <line x1="3" y1="12" x2="9.8" y2="12" stroke="#fff" stroke-width="1.3"/>
      <line x1="14.2" y1="12" x2="21" y2="12" stroke="#fff" stroke-width="1.3"/>
      <line x1="5.64" y1="5.64" x2="10.24" y2="10.24" stroke="#fff" stroke-width="1.1"/>
      <line x1="13.76" y1="13.76" x2="18.36" y2="18.36" stroke="#fff" stroke-width="1.1"/>
      <line x1="18.36" y1="5.64" x2="13.76" y2="10.24" stroke="#fff" stroke-width="1.1"/>
      <line x1="10.24" y1="13.76" x2="5.64" y2="18.36" stroke="#fff" stroke-width="1.1"/>
      <polygon points="12,0.5 13,2.8 12,3.8 11,2.8" fill="#fff"/>
      <polygon points="12,23.5 11,21.2 12,20.2 13,21.2" fill="#fff"/>
      <polygon points="0.5,12 2.8,11 3.8,12 2.8,13" fill="#fff"/>
      <polygon points="23.5,12 21.2,13 20.2,12 21.2,11" fill="#fff"/>
    </svg>
    <h1>Molis Links</h1>
    <span class="header-count" id="headerCount"></span>
  </header>

  <!-- Search -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search 234 lessons..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button id="searchClear" class="search-clear">&times;</button>
    </div>
  </div>

  <!-- Module filter -->
  <div class="filter-bar">
    <select id="moduleSelect" class="module-select">
      <option value="">All Modules</option>
    </select>
  </div>

  <!-- Favorites -->
  <div id="favoritesSection" class="favorites-section module-group expanded">
    <div class="module-header favorites-module-header" id="favoritesToggle">
      <div><span class="module-name">★ FAVORITES</span><span class="module-count" id="favCount"></span></div>
      <svg class="module-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </div>
    <div id="favoritesList" class="module-body favorites-list"></div>
  </div>

  <!-- Lesson list -->
  <div id="lessonList"></div>

  <!-- Empty state -->
  <div id="emptyState" class="empty-state">No lessons found.</div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Install banner -->
  <div id="installBanner" class="install-banner">
    <span class="install-banner-text">Add to Home Screen for quick access</span>
    <button id="installDismiss" class="install-banner-dismiss">&times;</button>
  </div>

  <!-- Scripts -->
  <script src="./links-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
